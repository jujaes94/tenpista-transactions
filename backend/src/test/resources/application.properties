# -----------------------------------------------------------------------
# Test-only overrides — picked up automatically by Spring Boot when tests
# run.  Replaces the PostgreSQL datasource with an H2 in-memory database
# so that @SpringBootTest can load the full application context during
# `mvn package` inside the Docker build container, where the PostgreSQL
# service is not yet running.
# -----------------------------------------------------------------------

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Keep the rest of the required properties so the context wires correctly
jwt.secret=test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256
jwt.expiration=86400000
cors.allowed-origins=http://localhost:3000
